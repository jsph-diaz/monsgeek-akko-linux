name: Release monsgeek-unbrick

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 0.1.0)"
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build Windows .exe
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust + Windows cross target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-gnu

      - name: Install mingw-w64 linker
        run: sudo apt-get update && sudo apt-get install -y gcc-mingw-w64-x86-64

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: unbrick
          workspaces: monsgeek-unbrick

      - name: Build release
        working-directory: monsgeek-unbrick
        run: cargo build --target x86_64-pc-windows-gnu --release

      - name: Rename binary
        run: |
          cp monsgeek-unbrick/target/x86_64-pc-windows-gnu/release/monsgeek-unbrick.exe \
             monsgeek-unbrick-v${{ inputs.version }}.exe

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: unbrick-v${{ inputs.version }}
          name: "monsgeek-unbrick v${{ inputs.version }}"
          body: |
            ## MonsGeek Keyboard Recovery Tool v${{ inputs.version }}

            Double-click the .exe on a Windows machine with the keyboard in DFU mode (BOOT0 bridged to 3.3V).

            **Features:**
            - Factory reset (erase all user data: config, keymaps, FN layers, macros, userpics)
            - Flash stock firmware v407 + factory reset
            - Deep reset (also erase calibration — for when keys don't respond after factory reset)
            - Flash custom firmware file
            - Dump full flash to file (for remote diagnosis)
            - Device info with calibration status diagnostics
            - Auto WinUSB driver installation

            No installation required — single standalone .exe.
          files: monsgeek-unbrick-v${{ inputs.version }}.exe
          draft: false
          prerelease: false
